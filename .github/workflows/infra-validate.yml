name: infra-validate

on:
  pull_request:
    paths:
      - 'infra/**'
      - '.github/workflows/infra-validate.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: rg-srodkowy-pc
  AZURE_LOCATION: polandcentral

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check Flex Consumption support
        shell: bash
        run: |
          count=$(az functionapp list-flexconsumption-locations --query "[?name=='${AZURE_LOCATION}'] | length(@)" -o tsv)
          if [ "$count" != "1" ]; then
            echo "Flex Consumption is not supported in ${AZURE_LOCATION}."
            exit 1
          fi

      - name: Build Bicep
        run: az bicep build --file infra/main.bicep

      - name: Validate deployment
        run: az deployment group validate --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --template-file infra/main.bicep --parameters infra/parameters/dev.bicepparam

      - name: What-if deployment
        run: az deployment group what-if --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --template-file infra/main.bicep --parameters infra/parameters/dev.bicepparam --result-format FullResourcePayloads
